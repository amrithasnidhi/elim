services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  fastapi:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped
    volumes:
      - ./backend:/app

  celery_worker:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379/0
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
      - chromadb
    restart: unless-stopped
    volumes:
      - ./backend:/app

volumes:
  mongo_data:
  chroma_data:
